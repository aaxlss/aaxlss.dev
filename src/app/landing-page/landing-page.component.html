<section class="hero">
  <div class="container">
    <h1>Welcome to My CV</h1>
    <p>{{ introduction }}</p>
  </div>
</section>

<section class="experience">
  <div class="container">
    <h2>Experience</h2>
    <div class="timeline">
      <div class="timeline-item" *ngFor="let experience of experiences">
        <div class="timeline-item-content">
          <h3>{{ experience.company }}</h3>
          <h4>{{ experience.position }}</h4>
          <p>{{ experience.duration }}</p>
          <ul>
            <li *ngFor="let responsibility of experience.responsibilities">
              {{ responsibility }}
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
